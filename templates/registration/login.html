{% extends "core/base.html" %}

{% block title %}Connexion{% endblock %}

{% block content %}
    <div class="columns is-centered">
        <div class="column is-half">
            <h2 class="title is-3">Connexion</h2>

            {% if form.errors %}
                <div class="notification is-danger">
                    Identifiants incorrects. Réessaie.
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="field">
                    <label class="label" for="{{ form.username.id_for_label }}">Nom d'utilisateur</label>
                    <div class="control">
                        {{ form.username }}
                    </div>
                </div>

                <div class="field">
                    <label class="label" for="{{ form.password.id_for_label }}">Mot de passe</label>
                    <div class="control">
                        {{ form.password }}
                    </div>
                </div>

                <div class="field is-grouped">
                    <div class="control">
                        <button class="button is-primary" type="submit">Se connecter</button>
                    </div>
                </div>

                {% if next %}
                    <input type="hidden" name="next" value="{{ next }}">
                {% endif %}
            </form>
        </div>
    </div>
{% endblock %}
