{% extends "workspace/base_private.html" %}

{% block workspace_content %}
<div class="content">
    <h2 class="title is-4 has-text-danger">
        Supprimer la note
    </h2>
    <p>Êtes-vous sûr de vouloir supprimer la note intitulée <strong>{{ note.title }}</strong> ?</p>
    <p class="has-text-grey is-size-7">Cette action est irréversible.</p>

    <form method="post" class="mt-4">
        {% csrf_token %}
        <div class="buttons">
            <button type="submit" class="button is-danger">Oui, supprimer</button>
            <a href="{% url 'note_detail' note.id %}" class="button is-light">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
