{% extends "core/base.html" %}

{% block title %}{{ site_name }} - Espace Privé{% endblock %}

{% block content %}
    <div class="columns is-gapless" style="flex: 1; min-height: 0;">

        <!-- Sidebar -->
        <aside class="has-background-light p-4 sidebar">
            <nav class="menu">

                <p class="menu-label">Espace personnel</p>
                <ul class="menu-list">
                    <li>
                        <a href="{% url 'workspace_index' %}" class="{% if request.resolver_match.url_name == 'workspace_index' %}is-active{% endif %}">
                            <i class="fa-regular fa-home mr-2" aria-hidden="true"></i>
                            Accueil
                        </a>
                    </li>

                    <li>
                        <a href="{% url 'note_list' %}" class="{% if request.resolver_match.url_name == 'note_list' %}is-active{% endif %}">
                            <i class="fa-regular fa-note-sticky mr-2" aria-hidden="true"></i>
                            Notes
                        </a>
                    </li>

                    <li>
                        <a href="{% url 'admin:index' %}" target="_blank">
                            <i class="fa-solid fa-gears mr-2" aria-hidden="true"></i>
                            Administration
                        </a>
                    </li>
                </ul>

                <p class="menu-label">À venir</p>
                <ul class="menu-list">
                    <li>
                        <span class="has-text-grey">
                            <i class="fa-solid fa-list-check mr-2" aria-hidden="true"></i>
                            Tâches
                        </span>
                    </li>
                </ul>

            </nav>
        </aside>

        <!-- Contenu principal -->
        <div class="sidebar-content">
            <div class="p-5">

                {% block workspace_content %}
                {% endblock %}

            </div>
        </div>

    </div>
{% endblock %}
