{% extends "core/base.html" %}

{% block title %}{{ site_name }} - Espace Privé{% endblock %}

{% block content %}
    <div class="columns is-gapless" style="flex: 1; min-height: 0;">

        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="sidebar-nav">

                <div class="sidebar-section-label">Espace personnel</div>

                <ul class="sidebar-menu">
                    <li>
                        <a href="{% url 'workspace_index' %}" class="sidebar-item {% if request.resolver_match.url_name == 'workspace_index' %}is-active{% endif %}">
                            <span class="sidebar-icon">
                                <i class="fa-regular fa-house" aria-hidden="true"></i>
                            </span>
                            Accueil
                        </a>
                    </li>
                    <li>
                        <a href="{% url 'note_list' %}" class="sidebar-item {% if request.resolver_match.url_name == 'note_list' %}is-active{% endif %}">
                            <span class="sidebar-icon">
                                <i class="fa-regular fa-note-sticky" aria-hidden="true"></i>
                            </span>
                            Notes
                        </a>
                    </li>
                    <li>
                        <a href="{% url 'task_list' %}" class="sidebar-item {% if request.resolver_match.url_name == 'task_list' %}is-active{% endif %}">
                            <span class="sidebar-icon">
                                <i class="fa-solid fa-list-check" aria-hidden="true"></i>
                            </span>
                            Tâches
                        </a>
                    </li>
                    <li>
                        <a href="{% url 'log_list' %}" class="sidebar-item" {% if request.resolver_match.url_name == 'log_list' %}is-active{% endif %}">
                            <span class="sidebar-icon">
                                <i class="fa-solid fa-clock-rotate-left" aria-hidden="true"></i>
                            </span>
                            Journaux
                        </a>
                    </li>
                </ul>

                <div class="sidebar-divider"></div>

                <div class="sidebar-section-label">À venir</div>

                <ul class="sidebar-menu">
                    <li>
                        <span class="sidebar-item is-disabled">
                            <span class="sidebar-icon">
                                <i class="fa-solid fa-list-check" aria-hidden="true"></i>
                            </span>
                            Rien
                            <span class="sidebar-soon">bientôt</span>
                        </span>
                    </li>
                </ul>

                <div class="sidebar-bottom">
                    <div class="sidebar-divider"></div>
                    <ul class="sidebar-menu">
                        <li>
                            <a href="{% url 'admin:index' %}" target="_blank" class="sidebar-item">
                                <span class="sidebar-icon">
                                    <i class="fa-solid fa-gears" aria-hidden="true"></i>
                                </span>
                                Administration
                            </a>
                        </li>
                    </ul>
                </div>

            </nav>
        </aside>

        <!-- Contenu principal -->
        <div class="sidebar-content">
            <div class="p-5">
                {% block workspace_content %}
                {% endblock %}
            </div>
        </div>

    </div>
{% endblock %}
